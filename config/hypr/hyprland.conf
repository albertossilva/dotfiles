monitor=,preferred,auto,1

# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# GDK
env = GDK_SCALE,1
# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
# Mozilla
env = MOZ_ENABLE_WAYLAND,1
# Set the cursor size for xcursor
env = XCURSOR_SIZE,24
# Disable appimage launcher by default
env = APPIMAGELAUNCHER_DISABLE,1
# OZONE
env = OZONE_PLATFORM,wayland

# ----------------------------------------------------- 
# Autostart
# ----------------------------------------------------- 
# Setup XDG for screen sharing
exec-once = ~/.config/hypr/scripts/xdg.sh

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dunst

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh
exec-once = wl-paste --watch cliphist store
exec-once = ~/.config/hypr/scripts/eww.sh
exec-once = hyprpaper
exec-once = ~/.config/ashell/launch.sh

exec-once = hyprpm reload -n
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# ----------------------------------------------------- 
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------
input {
    kb_layout = us,us
    kb_variant = mac, intl
    kb_model =
    kb_options = ctrl:nocaps,lv3:alt_switch
    numlock_by_default = true
    mouse_refocus = false
    follow_mouse = 1
    touchpad {
        natural_scroll = false
        clickfinger_behavior = true
    }
    sensitivity = 0.05 # -1.0 - 1.0, 0 means no modification.
}

device {
  name = asustek-rog-omni-receiver-keyboard
  kb_layout = us,us
  kb_variant = mac, intl
  kb_model =
  kb_options = ctrl:nocaps,lv3:alt_switch
  numlock_by_default = true
}

gestures {
  # workspace_swipe = true
  workspace_swipe_distance = 700
  # workspace_swipe_fingers = 3
  workspace_swipe_cancel_ratio = 0.2
  workspace_swipe_min_speed_to_force = 5
  workspace_swipe_direction_lock = true
  workspace_swipe_direction_lock_threshold = 10
  workspace_swipe_create_new = true
  workspace_swipe_invert = false
}

# -----------------------------------------------------
# Load pywal color file
# -----------------------------------------------------
source = ~/.cache/wal/colors-hyprland.conf

general {
  layout = hy3
  gaps_in = 4
  gaps_out = 4, 12, 12, 12
  border_size = 1
  col.active_border = $color11
  col.inactive_border = rgba(ffffffff)
  resize_on_border = true
}

decoration {
  rounding = 4
  blur {
    enabled = true
    size = 3
    passes = 1
    new_optimizations = on
    ignore_opacity = true
    xray = true
  }
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0
}

animations {
  enabled = false
}

dwindle {
  # pseudotile = true
  preserve_split = true
}

# ----------------------------------------------------- 
# Key bindings
# ----------------------------------------------------- 

# SUPER KEY
$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/scripts

# Applications
bind = $mainMod, RETURN, exec, ~/.config/.settings/terminal.sh
bind = $mainMod, B, exec, ~/.config/.settings/browser.sh
bind = $mainMod, E, exec, ~/.config/.settings/filemanager.sh
bind = $mainMod, A, exec, ~/.config/.settings/ai.sh
bind = $mainMod, SPACE, exec, rofi -show drun -replace -i
bind = $mainMod SHIFT, SPACE, exec, rofi -show calc -no-show-match -no-sort -config ~/.config/rofi/config-calc.rasi -replace -i
bind = $mainMod SHIFT, E, exec, rofi -show emoji -no-show-match -no-sort -config ~/.config/rofi/config-emoji.rasi -replace -i

# Windows
bind = $mainMod SHIFT, Q, killactive # Kill active program
bind = $mainMod SHIFT, W, closewindow # close active window
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, T, togglefloating
bind = $mainMod SHIFT, C, centerwindow
bind = $mainMod, M, togglespecialworkspace, M
bind = $mainMod SHIFT, M, movetoworkspace, special:M
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# bind = $mainMod, H, hy3:movefocus, l
# bind = $mainMod, J, hy3:movefocus, d
# bind = $mainMod, K, hy3:movefocus, u
# bind = $mainMod, L, hy3:movefocus, r

bind = $mainMod SHIFT, H, hy3:movewindow, l
bind = $mainMod SHIFT, J, hy3:movewindow, d
bind = $mainMod SHIFT, K, hy3:movewindow, u
bind = $mainMod SHIFT, L, hy3:movewindow, r
bind = $mainMod SHIFT, E, hy3:setephemeral, true
bind = $mainMod, S, hy3:changegroup, opposite
bind = $mainMod, G, hy3:makegroup, h
bind = $mainMod, V, hy3:makegroup, v

binde = $mainMod SHIFT, right, resizeactive, 1% 0
binde = $mainMod SHIFT, left, resizeactive, -1% 0

# Actions
bind = $mainMod, F8, exec, $HYPRSCRIPTS/screenshot.sh # Take a screenshot
bind = $mainMod SHIFT, B, exec, ~/.config/ashell/launch.sh # Reload waybar
bind = $mainMod SHIFT, V, exec, $SCRIPTS/cliphist.sh # Open clipboard manager
bind = $mainMod SHIFT, P, exec, hyprctl switchxkblayout asustek-rog-omni-receiver-keyboard next
bind = $mainMod SHIFT, O, exec, hyprctl switchxkblayout zsa-technology-labs-moonlander-mark-i-keyboard next

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# bind = $mainMod SHIFT, 1, movetoworkspace, 1
# bind = $mainMod SHIFT, 2, movetoworkspace, 2
# bind = $mainMod SHIFT, 3, movetoworkspace, 3
# bind = $mainMod SHIFT, 4, movetoworkspace, 4
# bind = $mainMod SHIFT, 5, movetoworkspace, 5
# bind = $mainMod SHIFT, 6, movetoworkspace, 6
# bind = $mainMod SHIFT, 7, movetoworkspace, 7
# bind = $mainMod SHIFT, 8, movetoworkspace, 8
# bind = $mainMod SHIFT, 9, movetoworkspace, 9
# bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, 1, hy3:movetoworkspace, 1, follow
bind = $mainMod SHIFT, 2, hy3:movetoworkspace, 2, follow
bind = $mainMod SHIFT, 3, hy3:movetoworkspace, 3, follow
bind = $mainMod SHIFT, 4, hy3:movetoworkspace, 4, follow
bind = $mainMod SHIFT, 5, hy3:movetoworkspace, 5, follow
bind = $mainMod SHIFT, 6, hy3:movetoworkspace, 6, follow
bind = $mainMod SHIFT, 7, hy3:movetoworkspace, 7, follow
bind = $mainMod SHIFT, 8, hy3:movetoworkspace, 8, follow
bind = $mainMod SHIFT, 9, hy3:movetoworkspace, 9, follow
bind = $mainMod SHIFT, 0, hy3:movetoworkspace, 10, follow

bind = $mainMod, Tab, cyclenext
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Passthrough SUPER KEY to Virtual Machine
bind = $mainMod, P, submap, passthru # Passthrough SUPER key to virtual machine
submap = passthru
bind = SUPER, Escape, submap, reset # Get SUPER key back from virtual machine
submap = reset

# Fn key
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10% # Increase brightness by 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s -10% # Reduce brightness by 10%
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% # Increase volume by 5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% # Reduce volume by 5%
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Toggle mute
bind = , XF86AudioPlay, exec, playerctl play-pause # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause # Audio pause
bind = , XF86AudioNext, exec, playerctl next # Audio next
bind = , XF86AudioPrev, exec, playerctl previous # Audio previous
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle # Toggle microphone
bind = , XF86Calculator, exec, qalculate-gtk # Open calculator

# ----------------------------------------------------- 
# Window rules
# ----------------------------------------------------- 
windowrule = match:title title:Chromium tile
windowrule = match:class qalculate-gtk float
windowrule = match:initial_class firefox, workspace 2
windowrule = match:class teams-for-linux, workspace 3
windowrule = match:class Postman, workspace 4
windowrule = match:class steam, workspace 5
windowrule = match:class Spotify, workspace 10

windowrule {
  name = "Picture-in-Picture"
  match:title = Picture-in-Picture
  float = true
  pin = true
  move = 69.5% 4%
}


windowrule {
  name = "Pavucontrol"
  match:class = org.pulseaudio.pavucontrol
  float = true
  size = 1000 600
  pin = true
}

windowrule {
  name = "Bluetooth"
  match:class = blueman-manager
  float = true
  size = 800 500
  pin = true
}

windowrule {
  name = "Network Manager"
  match:class = nm-connection-editor
  float = true
  pin = true
  size = 900 600
}

windowrule {
  name = "Disks"
  match:class = org.gnome.DiskUtility
  float = true
  size = 700 600
}

windowrule {
  name = "File explorer"
  match:class = thunar
  float = true
  size = 1200 800
}

# System Mission Center
windowrule {
  name = "Mission Center"
  match:class = io.missioncenter.MissionCenter 
  float = true
  pin = true
  size = 1200 800
}

# hyprland-share-picker

# ----------------------------------------------------- 
# Environment for xdg-desktop-portal-hyprland
# ----------------------------------------------------- 
# exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/dbusVariables.sh

